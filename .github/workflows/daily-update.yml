name: Daily Skills & Tools Collection

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run collector script
        run: python scrape_skills.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SKILLS.md TOOLS.md
          git diff --cached --quiet || git commit -m "🤖 Auto-update: Daily skills & tools collection [$(date +'%Y-%m-%d')]"
          git push
